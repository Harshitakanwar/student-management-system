<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
    }

    /* Navbar */
    .navbar {
        background: #1a1a1a;
        padding: 18px 10%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 0 20px rgba(255, 60, 0, 0.2);
    }

    .navbar strong {
        color: #ff3c00;
        font-size: 20px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 25px;
        font-weight: 500;
        transition: 0.3s;
    }

    .navbar a:hover {
        color: #ff3c00;
    }

    /* Contact Section */
    .container {
        padding: 100px 10%;
        text-align: center;
    }

    .container h1 {
        font-size: 40px;
        margin-bottom: 40px;
        color: #ff3c00;
    }

    /* Form Box */
    .contact-box {
        max-width: 600px;
        margin: auto;
        background: linear-gradient(145deg, #1c1c1c, #111);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 
            0 0 25px rgba(255, 60, 0, 0.3),
            inset 0 0 15px rgba(255, 60, 0, 0.05);
        transition: 0.4s ease;
    }

    .contact-box:hover {
        transform: translateY(-8px);
        box-shadow: 
            0 0 35px rgba(255, 60, 0, 0.6);
    }

    input, textarea {
        width: 100%;
        padding: 14px;
        margin: 15px 0;
        border-radius: 12px;
        border: none;
        background: #1a1a1a;
        color: white;
        outline: none;
        transition: 0.3s;
    }

    input:focus, textarea:focus {
        box-shadow: 0 0 10px rgba(255, 60, 0, 0.6);
    }

    button {
        margin-top: 15px;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #ff3c00, #ff7d1f);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255, 60, 0, 0.7);
    }
</style>
</head>
<body>

    <div class="navbar">
        <div><strong>Harshii</strong></div>
        <div>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    <div class="container">
        <h1>Contact Us</h1>

        <div class="contact-box">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button>Send Message</button>
        </div>

    </div>

</body>
</html>
